<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Edge Pro - Fair Odds Engine</title>
  <style>
    :root{
      --bg:#071017;--panel:#0e1b25;--panel2:#132634;--text:#e9f3f7;--muted:#9fb3bf;--line:#284251;
      --good:#34d399;--warn:#fbbf24;--bad:#fb7185;--blue:#60a5fa;--purple:#c084fc;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#071017,#0d1821 55%,#08131b);color:var(--text)}
    header{padding:22px 18px;border-bottom:1px solid var(--line);background:rgba(7,16,23,.92);position:sticky;top:0;z-index:5;backdrop-filter:blur(8px)}
    h1{margin:0;font-size:26px;letter-spacing:.3px}.sub{color:var(--muted);font-size:13px;margin-top:6px}
    main{padding:18px;max-width:1400px;margin:0 auto}.grid{display:grid;grid-template-columns:340px 1fr;gap:16px}.card{background:rgba(14,27,37,.94);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}input,select,textarea{width:100%;background:#07141d;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px}textarea{min-height:110px;resize:vertical}
    button{background:#2563eb;color:white;border:0;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer;margin-top:10px}button:hover{filter:brightness(1.1)}button.secondary{background:#263747}.row{display:flex;gap:8px;align-items:center}.row>*{flex:1}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{background:#132634;border:1px solid var(--line);padding:10px 12px;border-radius:999px;cursor:pointer;color:var(--muted);font-weight:700;font-size:13px}.tab.on{background:#2563eb;color:#fff;border-color:#3b82f6}
    .race{margin-bottom:16px}.raceHead{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#102432;border:1px solid var(--line);padding:12px;border-radius:14px;margin-bottom:8px}.raceTitle{font-weight:800}.pill{display:inline-block;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:800}.win{background:rgba(96,165,250,.16);color:var(--blue)}.value{background:rgba(52,211,153,.16);color:var(--good)}.ew{background:rgba(192,132,252,.16);color:var(--purple)}.avoid{background:rgba(251,113,133,.16);color:var(--bad)}.watch{background:rgba(251,191,36,.16);color:var(--warn)}
    table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:12px}th,td{border-bottom:1px solid var(--line);padding:9px 8px;text-align:left;font-size:13px;vertical-align:top}th{color:#bfd0da;background:#0b1822;position:sticky;top:93px;z-index:4}td{color:#e7eef2}.small{font-size:12px;color:var(--muted)}.num{text-align:right}.empty{padding:24px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px;background:#0c1b25}.status{margin-top:10px;color:var(--muted);font-size:13px;white-space:pre-wrap}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.kpi{background:#0b1822;border:1px solid var(--line);border-radius:14px;padding:12px}.kpi b{display:block;font-size:20px;margin-top:4px}.danger{color:var(--bad)}.good{color:var(--good)}.warn{color:var(--warn)}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}th{position:static}.raceHead{display:block}}
  </style>
</head>
<body>
<header>
  <h1>Race Edge Pro</h1>
  <div class="sub">New build · Fair Odds Engine · Value betting model, not a basic winner picker</div>
</header>
<main>
  <div class="grid">
    <section class="card">
      <h2 style="margin-top:0">API Login</h2>
      <label>Username</label><input id="username" autocomplete="username" placeholder="The Racing API username" />
      <label>Password</label><input id="password" type="password" autocomplete="current-password" placeholder="The Racing API password" />
      <div class="row">
        <button onclick="saveCreds()">Save Creds</button>
        <button class="secondary" onclick="fetchRacecards()">Fetch Racecards</button>
      </div>

      <label>Region</label>
      <select id="region">
        <option value="gb">GB</option><option value="ire">IRE</option><option value="gb,ire">GB + IRE</option><option value="">All</option>
      </select>
      <label>Temperature</label><input id="temperature" type="number" value="18" min="8" max="35" step="1" onchange="analyse()" />
      <label>Minimum Edge %</label><input id="minEdge" type="number" value="5" min="0" max="40" step="1" onchange="analyse()" />
      <label>Odds Paste Box</label>
      <textarea id="oddsText" placeholder="Paste odds like:\nHorse Name 5.50\nAnother Horse 8/1\nThird Horse 11-2"></textarea>
      <button class="secondary" onclick="parseOdds();analyse();">Load Odds</button>
      <div class="status" id="status">Ready.</div>
    </section>

    <section>
      <div class="tabs">
        <div class="tab on" data-tab="races" onclick="showTab('races')">Today’s Races</div>
        <div class="tab" data-tab="value" onclick="showTab('value')">Value Finder</div>
        <div class="tab" data-tab="weak" onclick="showTab('weak')">Weak Favourites</div>
        <div class="tab" data-tab="settings" onclick="showTab('settings')">Model Notes</div>
      </div>
      <div id="content"></div>
    </section>
  </div>
</main>
<script>
const API_BASE='https://api.theracingapi.com/v1';
const ST={races:[], analysed:[], odds:{}, tab:'races'};
const el=id=>document.getElementById(id);
const money=n=>Number.isFinite(n)?n.toFixed(2):'—';
const pct=n=>Number.isFinite(n)?(n*100).toFixed(1)+'%':'—';
const norm=s=>(s||'').toString().toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
function log(s){el('status').textContent=s}
function authHeader(){const u=el('username').value.trim(),p=el('password').value;return 'Basic '+btoa(`${u}:${p}`)}
function saveCreds(){localStorage.repUser=el('username').value;localStorage.repPass=el('password').value;log('Credentials saved locally in this browser.');}
function loadCreds(){el('username').value=localStorage.repUser||'';el('password').value=localStorage.repPass||'';}
function decOdds(raw){if(!raw)return null;raw=String(raw).trim();if(/^\d+(\.\d+)?$/.test(raw))return +raw;let m=raw.match(/(\d+)\s*[\/\-]\s*(\d+)/);if(m)return 1+(+m[1]/+m[2]);return null;}
function parseOdds(){ST.odds={};const txt=el('oddsText').value.split(/\n+/);let c=0;for(const line of txt){const m=line.trim().match(/^(.+?)\s+(\d+(?:\.\d+)?|\d+\s*[\/\-]\s*\d+)$/);if(m){ST.odds[norm(m[1])]=decOdds(m[2]);c++;}}log(`Loaded odds for ${c} horses.`)}
async function api(path, params={}){const qs=new URLSearchParams();Object.entries(params).forEach(([k,v])=>{if(v!==''&&v!=null)qs.append(k,v)});const res=await fetch(`${API_BASE}${path}?${qs}`,{headers:{Authorization:authHeader()}});if(!res.ok)throw new Error(`${res.status} ${res.statusText}`);return res.json();}
async function fetchRacecards(){try{log('Fetching racecards...');const region=el('region').value;const data=await api('/racecards/standard', region?{region_codes:region}:{}) ;ST.races=Array.isArray(data)?data:(data.racecards||data.races||data.data||[]);analyse();log(`Loaded ${ST.races.length} races.`)}catch(e){log('Fetch failed: '+e.message+'\nCheck username/password and API plan access.');}}
function fieldScore(runner){let s=50, notes=[];const age=Number(runner.age);if(age>=3&&age<=7){s+=4;notes.push('sensible age range')}else if(age>10){s-=5;notes.push('older horse risk')}const or=Number(runner.or||runner.official_rating);if(or>0){s+=Math.min(14,or/10);notes.push('official rating present')}const weight=(runner.lbs||runner.weight_lbs||runner.weight);if(weight){s+=2;notes.push('weight data present')}if(runner.form){const f=String(runner.form);const wins=(f.match(/1/g)||[]).length;const places=(f.match(/[123]/g)||[]).length;s+=wins*4+places*1.5;notes.push('recent form read')}else{notes.push('no recent form string')}if(runner.course_winner||runner.cd||runner.c_d){s+=7;notes.push('course/distance clue')}if(runner.distance_winner){s+=5;notes.push('distance winner')}if(runner.trainer_id){s+=3;notes.push('trainer id present')}if(runner.jockey_id){s+=3;notes.push('jockey id present')}if(runner.draw){s+=1;notes.push('draw present')}return {score:Math.max(1,Math.min(100,s)),notes};}
function analyse(){parseOdds();const T=Math.max(8,Number(el('temperature').value)||18);const minEdge=(Number(el('minEdge').value)||5)/100;ST.analysed=[];for(const race of ST.races){const runners=race.runners||race.horses||[];const scored=runners.map(r=>{const base=fieldScore(r);const horse=r.horse||r.name||r.horse_name||'Unknown';const odds=ST.odds[norm(horse)]||decOdds(r.odds)||decOdds(r.price);return {...r,horse,rawScore:base.score,notes:base.notes,marketOdds:odds};});const max=Math.max(...scored.map(x=>x.rawScore),1);let denom=0;scored.forEach(x=>{x.exp=Math.exp((x.rawScore-max)/T);denom+=x.exp});scored.forEach(x=>{x.modelProb=x.exp/denom;x.fairOdds=1/x.modelProb;x.marketProb=x.marketOdds?1/x.marketOdds:null;x.edge=x.marketProb!=null?x.modelProb-x.marketProb:null;x.valueRatio=x.marketOdds?x.marketOdds/x.fairOdds:null;x.decision=decision(x,minEdge);});scored.sort((a,b)=>b.modelProb-a.modelProb);const top=scored[0];const fav=scored.filter(x=>x.marketOdds).sort((a,b)=>a.marketOdds-b.marketOdds)[0];const bestValue=scored.filter(x=>x.edge!=null).sort((a,b)=>b.edge-a.edge)[0];const gap=scored[0]&&scored[1]?scored[0].modelProb-scored[1].modelProb:0;const raceDecision=gap<0.035?'TIGHT / CAUTION':'PLAYABLE';ST.analysed.push({race,scored,top,fav,bestValue,gap,raceDecision});}
render();}
function decision(x,minEdge){if(x.edge==null)return 'NO ODDS';if(x.edge>=0.15)return 'STRONG VALUE';if(x.edge>=0.10)return 'VALUE';if(x.edge>=minEdge)return 'SMALL EDGE';if(x.marketOdds<=2.5&&x.edge<0)return 'WEAK FAV?';return 'NO BET';}
function showTab(t){ST.tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.tab===t));render();}
function pill(d){let c=d.includes('VALUE')?'value':d.includes('FAV')?'avoid':d.includes('NO BET')?'watch':d.includes('NO ODDS')?'watch':'win';return `<span class="pill ${c}">${d}</span>`}
function render(){if(!ST.analysed.length){el('content').innerHTML='<div class="empty">Fetch racecards first. Then paste odds to unlock the fair-odds value engine.</div>';return}if(ST.tab==='value')return renderValue();if(ST.tab==='weak')return renderWeak();if(ST.tab==='settings')return renderSettings();renderRaces();}
function renderRaces(){let html=`<div class="kpis"><div class="kpi small">Races<b>${ST.analysed.length}</b></div><div class="kpi small">Value Bets<b>${ST.analysed.flatMap(r=>r.scored).filter(x=>x.decision.includes('VALUE')).length}</b></div><div class="kpi small">No-Odds Runners<b>${ST.analysed.flatMap(r=>r.scored).filter(x=>x.decision==='NO ODDS').length}</b></div><div class="kpi small">Tight Races<b>${ST.analysed.filter(r=>r.raceDecision.includes('TIGHT')).length}</b></div></div>`;
for(const rr of ST.analysed){const race=rr.race;html+=`<div class="card race"><div class="raceHead"><div><div class="raceTitle">${race.off_time||race.time||''} ${race.course||race.course_name||'Course'} - ${race.race_name||race.name||''}</div><div class="small">${raceDecisionText(rr)}</div></div><div>${rr.raceDecision.includes('TIGHT')?'<span class="pill watch">CAUTION</span>':'<span class="pill win">PLAYABLE</span>'}</div></div>${runnerTable(rr.scored)}</div>`}
el('content').innerHTML=html;}
function raceDecisionText(rr){return `Top: ${rr.top?.horse||'—'} · Best value: ${rr.bestValue?.horse||'—'} · Gap: ${(rr.gap*100).toFixed(1)}%`;}
function runnerTable(rows){return `<table><thead><tr><th>Horse</th><th class="num">Score</th><th class="num">Model %</th><th class="num">Fair Odds</th><th class="num">Market</th><th class="num">Edge</th><th>Decision</th><th>Notes</th></tr></thead><tbody>${rows.map(x=>`<tr><td><b>${x.horse}</b><div class="small">${x.trainer||x.trainer_name||''} ${x.jockey||x.jockey_name? ' · '+(x.jockey||x.jockey_name||''):''}</div></td><td class="num">${x.rawScore.toFixed(1)}</td><td class="num">${pct(x.modelProb)}</td><td class="num">${money(x.fairOdds)}</td><td class="num">${x.marketOdds?money(x.marketOdds):'—'}</td><td class="num ${x.edge>0?'good':x.edge<0?'danger':''}">${x.edge!=null?(x.edge*100).toFixed(1)+'%':'—'}</td><td>${pill(x.decision)}</td><td class="small">${x.notes.slice(0,4).join(', ')}</td></tr>`).join('')}</tbody></table>`}
function renderValue(){const rows=ST.analysed.flatMap(r=>r.scored.map(x=>({...x,race:r.race}))).filter(x=>x.edge!=null&&x.edge>0).sort((a,b)=>b.edge-a.edge);el('content').innerHTML=`<div class="card"><h2 style="margin-top:0">Value Finder</h2>${rows.length?runnerTable(rows):'<div class="empty">No positive value found. Paste bookmaker odds to compare against model fair odds.</div>'}</div>`}
function renderWeak(){const rows=ST.analysed.flatMap(r=>r.scored.map(x=>({...x,race:r.race}))).filter(x=>x.decision==='WEAK FAV?').sort((a,b)=>a.marketOdds-b.marketOdds);el('content').innerHTML=`<div class="card"><h2 style="margin-top:0">Weak Favourites</h2>${rows.length?runnerTable(rows):'<div class="empty">No weak favourites flagged yet.</div>'}</div>`}
function renderSettings(){el('content').innerHTML=`<div class="card"><h2 style="margin-top:0">How this new app works</h2><p>This is a clean starter build. It does not copy your old app. It prices each race using a softmax probability model, turns model chance into fair odds, then compares that against market odds.</p><p><b>Key formula:</b> fair odds = 1 / model probability. If market odds are bigger than fair odds, the horse may be overpriced.</p><p class="small">Next upgrades: trainer course analysis, jockey course analysis, distance-times, going suitability, pedigree filters, results tracker, and backtest lab.</p></div>`}
loadCreds();
</script>
</body>
</html>
